<meta name="apple-mobile-web-app-capable" content="yes">

<title>うごこっか♪</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
  background: #f5f0e8;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 1.5rem 1rem env(safe-area-inset-bottom, 1.5rem);
  padding-top: max(1.5rem, env(safe-area-inset-top));
  color: #1a1a18;
}
h1 { text-align: center; font-size: 18px; font-weight: 500; color: #444441; margin-bottom: 1.5rem; }
#app { max-width: 480px; margin: 0 auto; }
.tab-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.tab-btn {
  flex: 1; padding: 10px; border-radius: 12px;
  border: 0.5px solid #d4c9b8; background: #efe9dd;
  font-size: 16px; font-weight: 500; color: #5a5040;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active { background: #c8b89a; color: #fff; border-color: #c8b89a; }
.tab-btn:hover:not(.active) { background: #e8e0d2; }
.slot-wrapper {
  border: 0.5px solid #ddd; border-radius: 14px;
  padding: 1.5rem 1.25rem; background: #faf7f2;
  margin-bottom: 1rem; min-height: 100px;
  display: flex; align-items: center; justify-content: center; text-align: center;
}
.slot-label { font-size: 11px; color: #aaa; letter-spacing: 0.08em; margin-bottom: 6px; }
.slot-name { font-size: 24px; font-weight: 500; color: #1a1a18; line-height: 1.3; }
.slot-hint { font-size: 13px; color: #888; margin-top: 5px; }
.slot-spinning .slot-name { animation: flicker 0.08s linear infinite; }
@keyframes flicker {
  0%{opacity:1;transform:translateY(0)} 49%{opacity:0;transform:translateY(-6px)}
  50%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)}
}
.spin-btn {
  width: 100%; padding: 15px; border-radius: 14px;
  border: 0.5px solid #d4c9b8; background: #efe9dd;
  font-size: 17px; font-weight: 500; color: #1a1a18;
  cursor: pointer; margin-bottom: 1.5rem;
  transition: background 0.1s, transform 0.1s; font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.spin-btn:hover { background: #e8e0d2; }
.spin-btn:active { transform: scale(0.98); background: #d8cfc0; }
.spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.detail-card { border: 0.5px solid #ddd; border-radius: 14px; overflow: hidden; display: none; }
.detail-card.visible { display: block; }
.detail-head { padding: 1rem 1.25rem; background: #f5f0e8; border-bottom: 0.5px solid #ddd; }
.detail-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-bottom: 6px; font-weight: 500; }
.badge-stretch { background: #d4f0e4; color: #0a6040; }
.badge-muscle  { background: #fce5db; color: #8a3010; }
.detail-title { font-size: 19px; font-weight: 500; color: #1a1a18; }
.detail-body { padding: 1rem 1.25rem; background: #fff; }
.detail-meta { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.meta-item { font-size: 12px; color: #666; background: #f5f0e8; padding: 3px 10px; border-radius: 6px; }
.steps-title { font-size: 12px; font-weight: 500; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.step-row { display: flex; gap: 10px; margin-bottom: 9px; align-items: flex-start; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: #e8e0d2; border: 0.5px solid #d4c9b8;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: #666;
  flex-shrink: 0; margin-top: 1px;
}
.step-text { font-size: 14px; color: #1a1a18; line-height: 1.65; }
.video-link {
  display: flex; align-items: center; gap: 8px; margin-top: 1rem;
  padding: 10px 12px; border-radius: 8px; border: 0.5px solid #ddd;
  color: #1a5fa8; font-size: 13px; text-decoration: none;
  background: #fff; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.video-link:hover { background: #f5f0e8; }
.play-icon { width: 24px; height: 24px; border-radius: 50%; background: #e02020; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.play-triangle { width:0; height:0; border-top:5px solid transparent; border-bottom:5px solid transparent; border-left:8px solid white; margin-left:2px; }
@media (prefers-color-scheme: dark) {
  body { background: #2a2520; color: #e8e0d4; }
  .tab-btn { background: #38322c; border-color: #504840; color: #b0a090; }
  .tab-btn.active { background: #c8b89a; color: #fff; border-color: #c8b89a; }
  .tab-btn:hover:not(.active) { background: #443c34; }
  .slot-wrapper { background: #332d27; border-color: #504840; }
  .slot-name { color: #e8e0d4; }
  .slot-hint { color: #a09080; }
  .spin-btn { background: #38322c; border-color: #504840; color: #e8e0d4; }
  .spin-btn:hover { background: #443c34; }
  .spin-btn:active { background: #504840; }
  .detail-card { border-color: #504840; }
  .detail-head { background: #2e2820; border-color: #504840; }
  .detail-title { color: #e8e0d4; }
  .detail-body { background: #332d27; }
  .meta-item { background: #3e3830; color: #b0a090; }
  .step-num { background: #3e3830; border-color: #504840; color: #b0a090; }
  .step-text { color: #e8e0d4; }
  .video-link { background: #332d27; border-color: #504840; color: #a8c4d8; }
  .video-link:hover { background: #3e3830; }
}
</style>

  <div class="detail-card" id="detailCard">

    </div>

</div>

let mode = 'both';
let spinning = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['both','stretch','muscle'][i] === m);
  });
}

function filtered() {
  return mode === 'both' ? DATA : DATA.filter(d => d.type === mode);
}

function spin() {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  document.getElementById('detailCard').classList.remove('visible');
  const pool = filtered();
  let ticks = 0;
  const total = 18 + Math.floor(Math.random() * 10);
  const wrapper = document.getElementById('slotWrapper');
  wrapper.classList.add('slot-spinning');
  const iv = setInterval(() => {
    const r = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('slotName').textContent = r.name;
    document.getElementById('slotHint').textContent = r.parts;
    ticks++;
    if (ticks >= total) {
      clearInterval(iv);
      wrapper.classList.remove('slot-spinning');
      const final = pool[Math.floor(Math.random() * pool.length)];
      showResult(final);
      spinning = false;
      btn.disabled = false;
    }
  }, 90);
}

function showResult(item) {
  document.getElementById('slotName').textContent = item.name;
  document.getElementById('slotHint').textContent = item.parts + '　' + item.time;
  const badge = document.getElementById('detailBadge');
  badge.textContent = item.type === 'stretch' ? 'ストレッチ' : '筋トレ';
  badge.className = 'detail-badge ' + (item.type === 'stretch' ? 'badge-stretch' : 'badge-muscle');
  document.getElementById('detailTitle').textContent = item.name;
  document.getElementById('detailMeta').innerHTML =
    `<span class="meta-item">${item.parts}</span><span class="meta-item">${item.time}</span><span class="meta-item">効果: ${item.effect}</span>`;
  document.getElementById('detailSteps').innerHTML = item.steps.map((s,i) =>
    `<div class="step-row"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`
  ).join('');
  const vlink = document.getElementById('videoLink');
  if (item.video) {
    vlink.href = item.video;
    document.getElementById('videoLinkText').textContent = item.name + ' の動画を探す（YouTube）';
    vlink.style.display = 'flex';
  } else {
    vlink.style.display = 'none';
  }
  document.getElementById('detailCard').classList.add('visible');
}
</script>
</body>
</html>
